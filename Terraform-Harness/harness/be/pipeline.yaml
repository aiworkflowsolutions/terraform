pipeline:
  name: ${pipelineName}
  identifier: ${pipelineIdentifier}
  orgIdentifier: ${orgIdentifier}
  projectIdentifier: ${projectIdentifier}
  tags: {}
  delegateSelectors:
    - kubernetes-delegate
  properties:
    ci:
      codebase:
        connectorRef: account.Github
        repoName: ${pipelineName}
        build: <+input>
  variables:
    - name: serviceRef
      type: String
      value: <+input>
      description: "Harness service reference for deployment"
  stages:
    - stage:
        name: CI
        identifier: CI
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s
              namespace: api
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  name: Nexus
                  identifier: Nexus
                  template:
                    templateRef: Nexus
                    versionLabel: v0.1.0
                    gitBranch: main
                    templateInputs:
                      type: BuildAndPushDockerRegistry
                      spec:
                        tags: <+input>
                        dockerfile: <+input>
                        context: <+input>
    - stage:
        name: Deploy
        identifier: Deploy
        type: Deployment
        spec:
          deploymentType: Kubernetes
          environment:
            environmentRef: Prod
            deployToAll: false
            infrastructureDefinitions:
              - identifier: K8s
          service:
            serviceRef: <+pipeline.variables.serviceRef>
          execution:
            steps:
              - step:
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
